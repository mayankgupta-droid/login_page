<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Modern Auth</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <form action="/reset-password" method="POST">
            <h2>New Password</h2>
            <input type="hidden" name="email" id="email-field">
            <div class="form-group">
                <input type="password" name="new_password" placeholder="Enter New Password" required>
            </div>
            <button type="submit">UPDATE PASSWORD</button>
        </form>
    </div>

    <script>
        // Get email from URL and put it in the hidden field
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        if (email) {
            document.getElementById('email-field').value = email;
        } else {
            // Redirect back if no email
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
