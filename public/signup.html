<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Modern Auth</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <form action="/signup" method="POST">
            <h2>Create Account</h2>
            <div class="form-group">
                <input type="text" name="username" placeholder="Enter your username" required>
            </div>
            <div class="form-group">
                <input type="email" name="email" placeholder="Email Address" required>
            </div>
            <div class="form-group password-container">
                <input type="password" name="password" id="signup-pass" placeholder="Password" required>
                <i class="fas fa-eye toggle-password" onclick="togglePass('signup-pass', this)"></i>
            </div>
            <button type="submit">SIGN UP</button>
            <div class="links">
                <a href="index.html">Already have an account? Login</a>
            </div>
            <div class="social-login">
                <a href="#" onclick="socialAlert('Google')"><i class="fab fa-google"></i></a>
                <a href="#" onclick="socialAlert('Facebook')"><i class="fab fa-facebook-f"></i></a>
                <a href="#" onclick="socialAlert('GitHub')"><i class="fab fa-github"></i></a>
            </div>
        </form>
    </div>

    <script>
        function togglePass(id, icon) {
            const input = document.getElementById(id);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function socialAlert(platform) {
            alert(platform + " login coming soon");
        }
    </script>
</body>
</html>
